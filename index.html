<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JobHunt">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/styles.css">
  <title>JobHunt</title>
</head>
<body class="view-feed">
  <div id="app">

    <header id="topbar">
      <h1 id="title">JobHunt</h1>
      <button id="refresh-btn" type="button" aria-label="Refresh feed">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/>
        </svg>
      </button>
    </header>

    <div id="searchbar">
      <div id="search-wrap">
        <svg id="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input id="search-input" type="search" placeholder="Search jobs, companies…" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="search-clear" type="button" aria-label="Clear search">×</button>
      </div>
      <div id="source-chips" role="tablist">
        <button class="chip active" data-source="all" type="button">All</button>
        <button class="chip" data-source="RemoteOK" type="button">RemoteOK</button>
        <button class="chip" data-source="WWR" type="button">WWR</button>
        <button class="chip" data-source="HN" type="button">HN</button>
      </div>
      <div id="company-filter" hidden>
        <span>Filtered by company:</span>
        <strong id="company-filter-name"></strong>
        <button id="company-filter-clear" type="button" aria-label="Clear company filter">×</button>
      </div>
    </div>

    <main id="content">
      <div id="feed-list" class="job-list"></div>
      <div id="saved-list" class="job-list"></div>
      <div id="detail-view"></div>

      <div id="status-msg" hidden></div>
    </main>

    <nav id="tabbar">
      <button class="tab active" data-view="feed" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/>
        </svg>
        <span class="tab-label">Feed</span>
      </button>
      <button class="tab" data-view="saved" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="tab-label">Saved</span>
      </button>
    </nav>

  </div>
  <script src="/app.js"></script>
</body>
</html>
